name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-h5:
    name: Build H5
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: npm install -g pnpm@10.23.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build H5
        run: pnpm run build:h5
